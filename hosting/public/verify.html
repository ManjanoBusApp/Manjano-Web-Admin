<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Email Verification - Manjano Bus App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: rgb(218, 112, 214);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
            padding: 40px 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        h1 {
            color: #800080;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .sad-emoji {
            font-size: 60px;
            margin: 20px 0;
        }

        .success-icon {
            font-size: 60px;
            margin: 20px 0;
        }

        .message {
            font-size: 16px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .app-name {
            color: #800080;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #800080;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-button {
            background-color: #800080;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .app-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://firebasestorage.googleapis.com/v0/b/manjano-bus.firebasestorage.app/o/App%20Assets%2Fic_logo.png?alt=media&token=96d7f4e2-2ac7-4731-887d-7d6bce42f552"
             alt="Manjano Bus App Logo"
             onerror="this.style.display='none'">
    </div>
    <h1>Email Verification</h1>
    <div id="content">
        <div class="loader"></div>
        <div class="message">Verifying your email...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

<script>
    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBJrJFtvq5ikvQxOfW_7ODXFZ20BoS0zAg",
        authDomain: "manjano-bus.firebaseapp.com",
        projectId: "manjano-bus",
        storageBucket: "manjano-bus.firebasestorage.app",
        messagingSenderId: "585937380666",
        appId: "1:585937380666:web:d7856c41af385a7b6e5c03"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const functions = firebase.functions();

    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');

    const contentDiv = document.getElementById('content');
    let userEmail = "";

    // Make functions globally available
    window.openAppWithEmail = function() {
        window.location.href = `manjanoapp://verification-success?email=${encodeURIComponent(userEmail)}`;
    };

    window.openAppForSignIn = function() {
        window.location.href = `manjanoapp://signin?email=${encodeURIComponent(userEmail)}`;
    };

    window.openApp = function() {
        window.location.href = 'manjanoapp://verification-failed';
    };

    async function verifyEmail() {
        // 🔥 Check if we have either token or email
        if (!token && !email) {
            showError();
            return;
        }

        try {
            const verifyEmailFunction = functions.httpsCallable('verifyEmail');
            // 🔥 CRITICAL: Pass both token AND email to the function
            const result = await verifyEmailFunction({ token: token, email: email });

            console.log("Verification result:", result);

            // SUCCESS: First-time verification within 2 minutes
            if (result.data.success) {
                userEmail = result.data.email;
                showSuccess();
                return;
            }

            // ACCOUNT ACTIVE: User already signed up (email exists in parents collection)
            if (result.data.error === "account_active" && result.data.email) {
                userEmail = result.data.email;
                showAccountActive();
                return;
            }

            // EXPIRED: Link not clicked within 2 minutes
            if (result.data.error === "expired") {
                showExpired();
                return;
            }

            // ANY OTHER ERROR: Shows Oops page
            showError();

        } catch (error) {
            console.error('Verification error:', error);
            showError();
        }
    }

    // ✓ Green success page (first-time verification within 2 minutes)
    function showSuccess() {
        contentDiv.innerHTML = `
            <div class="success-icon" style="color: green;">✓</div>
            <div class="message" style="color: green; font-weight: 500;">
                Email verified successfully!
            </div>
            <div class="app-name">Manjano Bus App</div>
            <button class="app-button" onclick="window.openAppWithEmail()">Return to App</button>
        `;

        setTimeout(() => {
            window.openAppWithEmail();
        }, 2000);
    }

    // 😊 Purple success page with smiling emoji (user already signed up)
    function showAccountActive() {
        contentDiv.innerHTML = `
            <div class="success-icon" style="color: #800080;">😊</div>
            <div class="message" style="color: black; font-weight: 500;">
                Your account is already active. Taking you to sign in...
            </div>
            <div class="app-name">Manjano Bus App</div>
            <button class="app-button" onclick="window.openAppForSignIn()">Return to App</button>
        `;

        setTimeout(() => {
            window.openAppForSignIn();
        }, 2000);
    }

    // 😢 Expired page (link not clicked within 2 minutes)
    function showExpired() {
        contentDiv.innerHTML = `
            <div class="sad-emoji">😢</div>
            <div class="message">
                This verification link has expired.<br>
                Please go back to the app and request a new link.
            </div>
            <div class="app-name">Manjano Bus App</div>
            <button class="app-button" onclick="window.openApp()">Return to App</button>
        `;

        setTimeout(() => {
            window.openApp();
        }, 3000);
    }

    // 😢 Oops page (any other error)
    function showError() {
        contentDiv.innerHTML = `
            <div class="sad-emoji">😢</div>
            <div class="message">
                Oops! Something went wrong.<br>
                Please go back to the app and request a new link.
            </div>
            <div class="app-name">Manjano Bus App</div>
            <button class="app-button" onclick="window.openApp()">Return to App</button>
        `;

        setTimeout(() => {
            window.openApp();
        }, 3000);
    }

    // Start verification
    verifyEmail();
</script>
</body>
</html>
